name: SonarCloud Backend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Ensure SonarCloud project exists
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -e
          create_response=$(curl -sS -u "${SONAR_TOKEN}:" -X POST "https://sonarcloud.io/api/projects/create" \
            -d "organization=veeraganeshj" \
            -d "project=car-pooling-management-backend" \
            -d "name=car-pooling-management-backend" || true)

          echo "$create_response"

          if echo "$create_response" | grep -q '"errors"'; then
            if echo "$create_response" | grep -qi 'already exists'; then
              echo "SonarCloud project already exists, continuing."
            else
              echo "Failed to create SonarCloud project."
              exit 1
            fi
          fi

      - name: Build and analyze with Maven Sonar plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -DskipTests \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=veeraganeshj \
            -Dsonar.projectKey=veeraganeshj_car-pooling-management-backend
