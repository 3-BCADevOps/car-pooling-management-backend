# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - carpool-management-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/app.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B8DB76584FB6497BA97A85360EE83B61 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CD6D3B767D604D449EE14064418E7DAB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A655CBAEE7D5433EB97A7A976D1944A0 }}

      - name: Configure Azure Web App runtime settings
        shell: bash
        run: |
          set -euo pipefail

          RG_NAME=$(az webapp list --query "[?name=='carpool-management-backend'].resourceGroup | [0]" -o tsv)

          if [ -z "${RG_NAME}" ]; then
            echo "Could not determine resource group for app carpool-management-backend"
            exit 1
          fi

          az webapp config set \
            --resource-group "${RG_NAME}" \
            --name "carpool-management-backend" \
            --startup-file "java -jar /home/site/wwwroot/app.jar --server.port=\$PORT"

          # Increase allowed startup time for cold starts on constrained plans.
          az webapp config appsettings set \
            --resource-group "${RG_NAME}" \
            --name "carpool-management-backend" \
            --settings WEBSITES_CONTAINER_START_TIME_LIMIT=600 SPRING_JPA_OPEN_IN_VIEW=false

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'carpool-management-backend'
          slot-name: 'Production'
          package: 'app.jar'
          