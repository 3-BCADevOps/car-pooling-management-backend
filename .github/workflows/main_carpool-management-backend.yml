name: Build and deploy JAR app to Azure Web App - carpool-management-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fix mvnw permission (IMPORTANT for Linux runner)
      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      # Setup Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      # Build project
      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      # Upload JAR (auto-detects correct name)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Download built JAR
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      # Azure login using OIDC
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B8DB76584FB6497BA97A85360EE83B61 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CD6D3B767D604D449EE14064418E7DAB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A655CBAEE7D5433EB97A7A976D1944A0 }}

      # Deploy JAR to Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'carpool-management-backend'
          slot-name: 'Production'
          package: '*.jar'
