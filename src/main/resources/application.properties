spring.application.name=carpooling-management
server.port=${PORT:8080}

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/carpooldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.packages-to-scan=com.example.demo.entity

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# Local and preview origins allowed for API CORS.
app.cors.allowed-origin-patterns=http://localhost:3000,http://127.0.0.1:3000,https://*.vercel.app
