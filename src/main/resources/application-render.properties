spring.application.name=carpooling-management
server.port=${PORT:8080}

# Prefer a full JDBC URL when provided; otherwise compose one from individual settings.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:${POSTGRESQL_HOST:localhost}}:${SPRING_DATASOURCE_PORT:${POSTGRESQL_PORT:5432}}/${SPRING_DATASOURCE_DB:${POSTGRESQL_DATABASE:postgres}}}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRESQL_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRESQL_PASSWORD:postgres}}

spring.h2.console.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.packages-to-scan=com.example.demo.entity
spring.jpa.open-in-view=false

logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# Global CORS origins. Use * for all origins; replace with comma-separated origins/patterns when tightening access.
app.cors.allowed-origin-patterns=*