spring.application.name=carpooling-management
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST}:${SPRING_DATASOURCE_PORT}/${SPRING_DATASOURCE_DB}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.h2.console.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.packages-to-scan=com.example.demo.entity

logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# Production frontend origins for API CORS.
app.cors.allowed-origin-patterns=https://car-pooling-management-frontend-i8imuxd4v.vercel.app,https://*.vercel.app